<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkLink</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
--primary:#6c38ff;
--primary-dark:#562cd9;
--bg:#fdf6e3;
--card:#fff;
--text:#2d3436;
--success:#27ae60;
--input:#fff9e6;
--star:#f1c40f;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter}
body{background:var(--bg);color:var(--text);overflow-x:hidden}

/* NAV */
nav{
display:flex;justify-content:space-between;align-items:center;
padding:20px 50px;
background:var(--primary);
color:white;
position:sticky;top:0;z-index:1000
}

.logo{font-weight:800;font-size:28px;cursor:pointer}

.nav-links a{
color:white;margin-left:20px;
text-decoration:none;font-weight:600;
cursor:pointer
}

/* PAGES */
.page{display:none;min-height:100vh}
.active{display:block}

/* HERO (ВОЗВРАЩЕН КАК У ТЕБЯ) */
.hero{
display:flex;
background:var(--primary);
color:white;
height:calc(100vh - 80px);
align-items:center;
}

.hero-content{
flex:1;
padding:0 80px;
}

.hero h1{
font-size:64px;
font-weight:800;
line-height:1.1;
margin-bottom:30px;
}

.hero-image{
flex:1;
display:flex;
justify-content:center;
align-items:center;
}

.hero-img-main{
width:80%;
border-radius:30px;
box-shadow:20px 20px 60px rgba(0,0,0,0.3);
transform:rotate(-2deg);
}

/* CONTAINER */
.container{max-width:1200px;margin:auto;padding:40px 20px}

/* CARD */
.card{
background:white;
padding:30px;
border-radius:24px;
margin-bottom:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.03);
border:1px solid rgba(0,0,0,0.05)
}

/* BUTTON */
.btn{
padding:18px 30px;
border-radius:16px;
border:none;
font-weight:700;
cursor:pointer
}

.btn-main{background:var(--primary);color:white}
.btn-white{background:white;color:var(--primary)}
.btn-success{background:var(--success);color:white}

/* INPUT */
input,select{
width:100%;
padding:16px;
border-radius:14px;
border:1.5px solid #eee;
background:var(--input);
margin-top:8px
}

/* FORM */
.form-box{
background:white;
padding:40px;
border-radius:30px;
max-width:500px;
margin:auto
}

/* BUSINESS */
.biz-hero{
text-align:center;
padding:100px 20px;
background:white;
border-radius:50px;
margin:40px
}

.biz-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
margin-top:40px
}

.biz-card{
background:var(--bg);
padding:40px;
border-radius:30px;
transition:.3s
}

.biz-card:hover{transform:translateY(-10px)}

/* PROFILE */
.avatar{
width:80px;height:80px;
background:var(--primary);
color:white;
display:flex;
align-items:center;
justify-content:center;
border-radius:25px;
font-size:30px;
font-weight:800
}

.balance-box{
background:linear-gradient(135deg,#6c38ff,#a285ff);
color:white;
padding:30px;
border-radius:30px;
margin-bottom:30px
}

/* MODAL */
.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
align-items:center;
justify-content:center
}

.modal-content{
background:white;
padding:40px;
border-radius:30px;
width:90%;
max-width:400px;
text-align:center
}

.star{
font-size:35px;
cursor:pointer;
color:#ddd
}

.star.active{color:var(--star)}

/* TOAST */
#toasts{position:fixed;top:100px;right:20px}
.toast{
background:#2d3436;
color:white;
padding:14px 20px;
border-radius:15px;
margin-bottom:10px
}

@media(max-width:900px){
.hero{flex-direction:column;height:auto}
.hero-content{padding:40px;text-align:center}
.hero h1{font-size:40px}
.hero-image{display:none}
}
</style>
</head>

<body>

<div id="toasts"></div>

<!-- MODAL -->
<div id="ratingModal" class="modal">
<div class="modal-content">
<h2>Как всё прошло?</h2>
<p>Оцените работу</p>

<div id="stars">
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
</div>

<button class="btn btn-main">Ок</button>
</div>
</div>

<!-- NAV -->
<nav>
<div class="logo" onclick="show('home')">worklink</div>

<div class="nav-links" id="guest">
<a onclick="show('business')">Бизнесу</a>
<a onclick="show('login')">Вход</a>
<a onclick="show('register')">Регистрация</a>
</div>

<div class="nav-links" id="user" style="display:none">
<a onclick="show('worker')">Работа</a>
<a onclick="show('profile')">Профиль</a>
<a onclick="logout()">Выход</a>
</div>
</nav>

<!-- HOME -->
<div id="home" class="page active">
<div class="hero">
<div class="hero-content">
<h1>Твоя работа здесь</h1>
<p>Быстрые смены · реальные деньги</p>
<button class="btn btn-white" onclick="show('register')">Начать</button>
</div>

<div class="hero-image">
<img class="hero-img-main" src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f">
</div>
</div>
</div>

<!-- LOGIN -->
<div id="login" class="page container">
<div class="form-box">
<h2>Вход</h2>
<input id="l_phone" placeholder="Телефон">
<input id="l_pass" type="password" placeholder="Пароль">
<button class="btn btn-main">Войти</button>
</div>
</div>

<!-- REGISTER -->
<div id="register" class="page container">
<div class="form-box">
<h2>Регистрация</h2>
<input id="r_phone">
<input id="r_pass">
<select id="r_role">
<option>worker</option>
<option>business</option>
</select>
<button class="btn btn-main">Создать</button>
</div>
</div>

<script>
function show(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function logout(){
location.reload();
}
</script>

</body>
</html>
