<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkLink Enterprise — Ultimate Architecture</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Палитра */
            --primary: #6c38ff;
            --primary-light: #a281ff;
            --primary-dark: #4a1dcb;
            --accent: #00d2ff;
            --success: #00b894;
            --warning: #fbc531;
            --danger: #ff4757;
            
            /* Фон и Текст (Светлая тема) */
            --bg-main: #f4f7fe;
            --bg-card: #ffffff;
            --bg-input: #f1f4f9;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            
            /* Эффекты */
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.02);
            --shadow-md: 0 10px 25px -5px rgba(0,0,0,0.05);
            --shadow-lg: 0 20px 50px -10px rgba(108, 56, 255, 0.15);
            --radius-sm: 12px;
            --radius-md: 20px;
            --radius-lg: 32px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #0f172a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --shadow-lg: 0 20px 50px -10px rgba(0, 0, 0, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { 
            background: var(--bg-main); 
            color: var(--text-main); 
            transition: var(--transition);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* --- СКРОЛЛБАР (Детализация для 3к строк) --- */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb { 
            background: var(--border-color); 
            border-radius: 10px; 
            border: 3px solid var(--bg-main);
        }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary-light); }

        /* --- СЕТКА И КОНТЕЙНЕРЫ --- */
        .app-container {
            display: grid;
            grid-template-columns: 280px 1fr;
            min-height: 100vh;
        }

        /* --- САЙДБАР (Навигация) --- */
        aside {
            background: var(--bg-card);
            border-right: 1px solid var(--border-color);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            height: 100vh;
            z-index: 100;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 10px 40px;
            text-decoration: none;
        }

        .brand-logo {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 900;
            box-shadow: 0 8px 16px var(--primary-light);
        }

        .brand-name {
            font-size: 22px;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -1px;
        }

        .nav-group { margin-bottom: 30px; }
        .nav-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 15px;
            padding-left: 10px;
            letter-spacing: 1px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 600;
            border-radius: var(--radius-sm);
            margin-bottom: 5px;
            transition: var(--transition);
            cursor: pointer;
        }

        .nav-item:hover {
            background: var(--bg-input);
            color: var(--primary);
        }

        .nav-item.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 10px 20px -5px var(--primary-light);
        }

        /* --- ОСНОВНОЙ КОНТЕНТ --- */
        main { padding: 40px; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .user-widget {
            display: flex;
            align-items: center;
            gap: 15px;
            background: var(--bg-card);
            padding: 8px 20px 8px 8px;
            border-radius: 50px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary-light);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
        }

        /* --- КАРТОЧКИ (УЛЬТРА ДЕТАЛИЗАЦИЯ) --- */
        .glass-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 30px;
            box-shadow: var(--shadow-md);
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: var(--primary);
            opacity: 0;
            transition: var(--transition);
        }

        .glass-card:hover::before { opacity: 1; }

        /* --- АНИМАЦИИ --- */
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate { animation: slideIn 0.5s ease forwards; }
    </style>
</head>
<body>

<div class="app-container">
    <aside>
        <a href="#" class="brand">
            <div class="brand-logo">W</div>
            <div class="brand-name">WorkLink</div>
        </a>

        <div class="nav-group">
            <div class="nav-label">Основное</div>
            <div class="nav-item active" onclick="showSection('dashboard')"><span>📊</span> Дашборд</div>
            <div class="nav-item" onclick="showSection('market')"><span>💼</span> Биржа задач</div>
            <div class="nav-item" onclick="showSection('messages')"><span>💬</span> Сообщения</div>
        </div>

        <div class="nav-group">
            <div class="nav-label">Финансы</div>
            <div class="nav-item" onclick="showSection('wallet')"><span>💳</span> Кошелек</div>
            <div class="nav-item" onclick="showSection('history')"><span>📜</span> История</div>
        </div>

        <div style="margin-top: auto;">
            <div class="nav-item" style="color: var(--danger);" onclick="openLogoutModal()"><span>🚪</span> Выйти</div>
        </div>
    </aside>

    <main id="main-content">
        <header>
            <div>
                <h1 id="page-title">Добро пожаловать</h1>
                <p style="color: var(--text-muted);">Рады видеть вас снова в системе.</p>
            </div>
            
            <div class="user-widget">
                <div class="user-avatar" id="nav-avatar">?</div>
                <div>
                    <div style="font-weight: 700; font-size: 14px;" id="nav-name">Гость</div>
                    <div style="font-size: 11px; color: var(--success); font-weight: 700;" id="nav-status">Online</div>
                </div>
            </div>
        </header>

        <div id="section-content" class="animate">
            <div class="glass-card">
                <h2>Загрузка модулей системы...</h2>
                <p>Инициализация базы данных и стилей.</p>
            </div>
        </div>
    </main>
</div>

<script>
    // Базовая логика переключения без резания кода
    function showSection(name) {
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        event.currentTarget.classList.add('active');
        document.getElementById('page-title').innerText = name.charAt(0).toUpperCase() + name.slice(1);
        // Здесь будет подгрузка контента из Модуля 2
    }
</script>

</body>
</html>
