<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkLink — upgraded</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
--primary:#6c38ff;
--bg:#fdf6e3;
--card:#fff;
--text:#2d3436;
--success:#27ae60;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter}
body{background:var(--bg);color:var(--text)}

nav{
display:flex;justify-content:space-between;align-items:center;
padding:18px 40px;
background:var(--primary);color:white;
position:sticky;top:0;z-index:1000
}

.logo{font-weight:800;cursor:pointer}

.nav-links a{color:white;margin-left:20px;cursor:pointer;text-decoration:none}

.page{display:none;padding:30px}
.active{display:block}

.container{max-width:1000px;margin:auto}

.card{
background:white;padding:20px;border-radius:20px;
margin-bottom:15px;box-shadow:0 10px 25px rgba(0,0,0,0.05)
}

.btn{
padding:12px 18px;border:none;border-radius:12px;
cursor:pointer;font-weight:700
}

.btn-main{background:var(--primary);color:white}
.btn-success{background:var(--success);color:white}

input,select{
width:100%;padding:12px;margin-top:8px;
border-radius:10px;border:1px solid #ddd
}

.hero{
background:var(--primary);
color:white;padding:80px 30px;
border-radius:30px;margin:20px
}

.toast{
position:fixed;top:90px;right:20px;
background:#111;color:white;
padding:12px 18px;border-radius:12px;
margin-top:10px
}
</style>
</head>

<body>

<div id="toasts"></div>

<nav>
<div class="logo" onclick="show('home')">worklink</div>

<div class="nav-links" id="guest">
<a onclick="show('login')">Вход</a>
<a onclick="show('register')">Регистрация</a>
</div>

<div class="nav-links" id="user" style="display:none">
<a onclick="show('worker')">Работа</a>
<a onclick="show('business')">Бизнес</a>
<a onclick="logout()">Выход</a>
</div>
</nav>

<!-- HOME -->
<div id="home" class="page active">
<div class="hero">
<h1>Работа за 1 клик 💼</h1>
<p>Быстрые смены · Реальные выплаты</p>
</div>
</div>

<!-- LOGIN -->
<div id="login" class="page container">
<div class="card">
<h2>Вход</h2>
<input id="l_phone" placeholder="Телефон">
<input id="l_pass" type="password" placeholder="Пароль">
<button class="btn btn-main" onclick="login()">Войти</button>
</div>
</div>

<!-- REGISTER -->
<div id="register" class="page container">
<div class="card">
<h2>Регистрация</h2>

<input id="r_phone" placeholder="Телефон">
<input id="r_pass" type="password" placeholder="Пароль">

<select id="r_role">
<option value="worker">Работник</option>
<option value="business">Бизнес</option>
</select>

<button class="btn btn-main" onclick="register()">Создать</button>
</div>
</div>

<!-- WORKER -->
<div id="worker" class="page container">
<h2>Смены</h2>
<div id="jobs"></div>
</div>

<!-- BUSINESS -->
<div id="business" class="page container">
<h2>Создать задачу</h2>

<div class="card">
<input id="t_title" placeholder="Название">
<input id="t_price" type="number" placeholder="Цена">
<input id="t_city" placeholder="Город">

<button class="btn btn-main" onclick="createJob()">Создать</button>
</div>

<h2>Мои задачи</h2>
<div id="myjobs"></div>
</div>

<script>
let user = JSON.parse(localStorage.getItem("wl")) || null;

function toast(m){
const t=document.createElement("div");
t.className="toast";
t.innerText=m;
document.getElementById("toasts").appendChild(t);
setTimeout(()=>t.remove(),2500);
}

function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function updateUI(){
if(user){
document.getElementById("guest").style.display="none";
document.getElementById("user").style.display="flex";
}
}

function register(){
const u={
phone:r_phone.value,
pass:r_pass.value,
role:r_role.value,
balance:0,
jobs:[]
};
localStorage.setItem(u.phone,JSON.stringify(u));
toast("создано");
show("login");
}

function login(){
const u=JSON.parse(localStorage.getItem(l_phone.value));
if(!u || u.pass!==l_pass.value){
toast("ошибка");
return;
}
user=u;
localStorage.setItem("wl",JSON.stringify(u));
updateUI();
loadJobs();
show(u.role==="worker"?"worker":"business");
}

function logout(){
localStorage.clear();
location.reload();
}

function createJob(){
let job={
id:Date.now(),
title:t_title.value,
price:+t_price.value,
city:t_city.value,
status:"open",
owner:user.phone,
worker:null
};

let arr=JSON.parse(localStorage.getItem("jobs")||"[]");
arr.push(job);
localStorage.setItem("jobs",JSON.stringify(arr));

toast("создано");
loadJobs();
}

function loadJobs(){
let jobs=JSON.parse(localStorage.getItem("jobs")||"[]");

jobsContainer(jobs);
myJobs(jobs);
}

function jobsContainer(jobs){
if(!jobs) return;
let el=document.getElementById("jobs");
el.innerHTML="";

jobs.forEach(j=>{
if(j.status==="open"){
el.innerHTML+=`
<div class="card">
<h3>${j.title}</h3>
<p>${j.price} ₸ · ${j.city}</p>
<button class="btn btn-main" onclick="take(${j.id})">взять</button>
</div>`;
}
});
}

function myJobs(jobs){
let el=document.getElementById("myjobs");
el.innerHTML="";

jobs.filter(j=>j.owner===user.phone).forEach(j=>{
el.innerHTML+=`
<div class="card">
<h3>${j.title}</h3>
<p>${j.status}</p>
</div>`;
});
}

function take(id){
let jobs=JSON.parse(localStorage.getItem("jobs"));
let j=jobs.find(x=>x.id==id);

if(j.status!=="open") return;

j.status="done";
j.worker=user.phone;

localStorage.setItem("jobs",JSON.stringify(jobs));

toast("взято");
loadJobs();
}

updateUI();
if(user) loadJobs();
</script>

</body>
</html>
