<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkLink Enterprise — Ultimate Architecture</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Палитра */
            --primary: #6c38ff;
            --primary-light: #a281ff;
            --primary-dark: #4a1dcb;
            --accent: #00d2ff;
            --success: #00b894;
            --warning: #fbc531;
            --danger: #ff4757;
            
            /* Фон и Текст (Светлая тема) */
            --bg-main: #f4f7fe;
            --bg-card: #ffffff;
            --bg-input: #f1f4f9;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            
            /* Эффекты */
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.02);
            --shadow-md: 0 10px 25px -5px rgba(0,0,0,0.05);
            --shadow-lg: 0 20px 50px -10px rgba(108, 56, 255, 0.15);
            --radius-sm: 12px;
            --radius-md: 20px;
            --radius-lg: 32px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #0f172a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --shadow-lg: 0 20px 50px -10px rgba(0, 0, 0, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { 
            background: var(--bg-main); 
            color: var(--text-main); 
            transition: var(--transition);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* --- СКРОЛЛБАР (Детализация для 3к строк) --- */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb { 
            background: var(--border-color); 
            border-radius: 10px; 
            border: 3px solid var(--bg-main);
        }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary-light); }

        /* --- СЕТКА И КОНТЕЙНЕРЫ --- */
        .app-container {
            display: grid;
            grid-template-columns: 280px 1fr;
            min-height: 100vh;
        }

        /* --- САЙДБАР (Навигация) --- */
        aside {
            background: var(--bg-card);
            border-right: 1px solid var(--border-color);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            height: 100vh;
            z-index: 100;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 10px 40px;
            text-decoration: none;
        }

        .brand-logo {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 900;
            box-shadow: 0 8px 16px var(--primary-light);
        }

        .brand-name {
            font-size: 22px;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -1px;
        }

        .nav-group { margin-bottom: 30px; }
        .nav-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 15px;
            padding-left: 10px;
            letter-spacing: 1px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 600;
            border-radius: var(--radius-sm);
            margin-bottom: 5px;
            transition: var(--transition);
            cursor: pointer;
        }

        .nav-item:hover {
            background: var(--bg-input);
            color: var(--primary);
        }

        .nav-item.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 10px 20px -5px var(--primary-light);
        }

        /* --- ОСНОВНОЙ КОНТЕНТ --- */
        main { padding: 40px; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .user-widget {
            display: flex;
            align-items: center;
            gap: 15px;
            background: var(--bg-card);
            padding: 8px 20px 8px 8px;
            border-radius: 50px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary-light);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
        }

        /* --- КАРТОЧКИ (УЛЬТРА ДЕТАЛИЗАЦИЯ) --- */
        .glass-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 30px;
            box-shadow: var(--shadow-md);
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: var(--primary);
            opacity: 0;
            transition: var(--transition);
        }

        .glass-card:hover::before { opacity: 1; }

        /* --- АНИМАЦИИ --- */
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate { animation: slideIn 0.5s ease forwards; }

        /* --- MARKETPLACE STYLES --- */
.job-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
    gap: 25px;
    margin-top: 30px;
}

.job-card {
    cursor: pointer;
    transition: var(--transition);
    border-left: 5px solid transparent;
}

.job-card:hover {
    transform: translateY(-5px);
    border-left-color: var(--primary);
}

.job-badge {
    display: inline-block;
    padding: 4px 12px;
    background: var(--bg-input);
    color: var(--primary);
    border-radius: 50px;
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
    margin-bottom: 15px;
}

.job-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 15px;
}

.job-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--text-main);
}

.job-price {
    font-size: 20px;
    font-weight: 900;
    color: var(--success);
}

.job-excerpt {
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 20px;
    height: 44px;
    overflow: hidden;
}

.job-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 15px;
    border-top: 1px solid var(--border-color);
}

.job-meta {
    font-size: 12px;
    color: var(--text-muted);
    display: flex;
    gap: 15px;
}

.job-owner {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-weight: 600;
}

.owner-avatar {
    width: 24px;
    height: 24px;
    background: var(--primary-light);
    border-radius: 6px;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
}

.status-tag {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 10px;
    font-weight: 900;
    padding: 2px 8px;
    border-radius: 4px;
}

.status-tag.busy { background: var(--warning); color: #000; }
    </style>
</head>
<body>

<div class="app-container">
    <aside>

<script>
    // Базовая логика переключения без резания кода
    function showSection(name) {
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        event.currentTarget.classList.add('active');
        document.getElementById('page-title').innerText = name.charAt(0).toUpperCase() + name.slice(1);
        /* --- МОДУЛЬ 2: CORE BACKEND & AUTH --- */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { 
    getDatabase, ref, set, get, child, onValue, update, push 
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

// Конфигурация инфраструктуры
const firebaseConfig = {
    apiKey: "AIzaSyAjSLp9bkzKz71GytZU1Jz5bQoNMKB5Fxo",
    authDomain: "worklink-5384c.firebaseapp.com",
    databaseURL: "https://worklink-5384c-default-rtdb.firebaseio.com/",
    projectId: "worklink-5384c",
    storageBucket: "worklink-5384c.firebasestorage.app",
    appId: "1:582114312352:web:08dea19f81f35abfe649c5"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// Глобальное состояние приложения
window.AppState = {
    user: JSON.parse(localStorage.getItem('wl_pro_session')) || null,
    isLoaded: false,
    activeSection: 'dashboard',
    cache: {
        orders: [],
        users: {}
    }
};

/**
 * Инициализация пользовательской сессии
 * Выполняется при каждой загрузке страницы
 */
window.initSession = () => {
    const session = window.AppState.user;
    if (!session) {
        console.log("[System] Сессия не найдена. Режим гостя.");
        updateNavigation('guest');
        return;
    }

    // Слушатель данных пользователя в реальном времени
    const userRef = ref(db, `users/${session.phone}`);
    onValue(userRef, (snapshot) => {
        const userData = snapshot.val();
        if (userData) {
            window.AppState.user = userData;
            localStorage.setItem('wl_pro_session', JSON.stringify(userData));
            syncUI(userData);
            updateNavigation('user');
        } else {
            console.error("[System] Ошибка синхронизации профиля.");
            window.logout();
        }
    });
};

/**
 * Синхронизация интерфейса с данными БД
 */
function syncUI(data) {
    // Навигация
    const navName = document.getElementById('nav-name');
    const navAvatar = document.getElementById('nav-avatar');
    const navBalance = document.getElementById('nav-balance');

    if (navName) navName.innerText = data.phone;
    if (navAvatar) navAvatar.innerText = data.phone[0].toUpperCase();
    if (navBalance) navBalance.innerText = `${data.balance || 0} ₸`;

    // Если мы в профиле, обновляем и там
    const profName = document.getElementById('prof-name');
    if (profName) profName.innerText = data.phone;
}

/**
 * Управление навигационными панелями
 */
function updateNavigation(mode) {
    const guestUI = document.getElementById('guest-ui');
    const userUI = document.getElementById('user-ui');

    if (mode === 'user') {
        if (guestUI) guestUI.style.display = 'none';
        if (userUI) userUI.style.display = 'flex';
    } else {
        if (guestUI) guestUI.style.display = 'flex';
        if (userUI) userUI.style.display = 'none';
    }
}

/**
 * Глобальная авторизация (Вход / Регистрация)
 */
window.handleAuth = async (mode) => {
    console.log(`[Auth] Запуск процесса: ${mode}`);
    
    const phoneInput = document.getElementById(`${mode === 'reg' ? 'reg' : 'log'}-phone`);
    const passInput = document.getElementById(`${mode === 'reg' ? 'reg' : 'log'}-pass`);

    if (!phoneInput || !passInput) return;

    const phone = phoneInput.value.trim();
    const pass = passInput.value.trim();

    if (phone.length < 5 || pass.length < 4) {
        window.systemNotification("Некорректные данные", "error");
        return;
    }

    try {
        if (mode === 'reg') {
            const role = document.getElementById('reg-role').value;
            // Проверка на существование
            const checkSn = await get(child(ref(db), `users/${phone}`));
            if (checkSn.exists()) {
                window.systemNotification("Номер уже занят", "error");
                return;
            }

            const newUser = {
                phone,
                pass,
                role,
                balance: 0,
                exp: 0,
                level: 1,
                isVerified: false,
                createdAt: Date.now(),
                lastLogin: Date.now(),
                transactions: [
                    { type: 'system', msg: 'Активация аккаунта', amt: 0, date: Date.now() }
                ],
                stats: { completed: 0, created: 0, rating: 5.0 }
            };

            await set(ref(db, `users/${phone}`), newUser);
            window.systemNotification("Регистрация успешна!");
            window.showPage('login');
        } else {
            const sn = await get(child(ref(db), `users/${phone}`));
            if (sn.exists() && sn.val().pass === pass) {
                const userData = sn.val();
                
                // Обновляем время входа
                await update(ref(db, `users/${phone}`), { lastLogin: Date.now() });
                
                window.AppState.user = userData;
                localStorage.setItem('wl_pro_session', JSON.stringify(userData));
                
                window.initSession();
                window.systemNotification(`Добро пожаловать, ${phone}`);
                window.showPage('dashboard');
            } else {
                window.systemNotification("Неверный логин или пароль", "error");
            }
        }
    } catch (e) {
        console.error(e);
        window.systemNotification("Ошибка сервера", "error");
    }
};

/**
 * Безопасный выход из системы
 */
window.logout = () => {
    localStorage.removeItem('wl_pro_session');
    window.AppState.user = null;
    window.location.reload();
};

/**
 * Системные уведомления (Улучшенная версия)
 */
window.systemNotification = (msg, type = "success") => {
    const container = document.getElementById('toast-box');
    if (!container) return;

    const toast = document.createElement('div');
    toast.className = `toast toast-${type}`;
    toast.innerHTML = `
        <div class="toast-icon">${type === 'success' ? '✅' : '❌'}</div>
        <div class="toast-body">
            <div class="toast-title">${type === 'success' ? 'Успешно' : 'Внимание'}</div>
            <div class="toast-msg">${msg}</div>
        </div>
    `;
    
    container.appendChild(toast);
    setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(50px)';
        setTimeout(() => toast.remove(), 500);
    }, 4000);
};

// Запуск при старте
document.addEventListener('DOMContentLoaded', () => {
    window.initSession();
});
    }

window.renderMarketplace = (filterData = null) => {
    const container = document.getElementById('market-grid');
    if (!container) return;

    // Скелетная загрузка (UX)
    container.innerHTML = '<div class="loader-skeleton">Загрузка актуальных предложений...</div>';

    const ordersRef = ref(db, 'orders');
    onValue(ordersRef, (snapshot) => {
        const data = snapshot.val();
        if (!data) {
            container.innerHTML = '<div class="empty-state">Пока задач нет. Станьте первым заказчиком!</div>';
            return;
        }

        let orders = Object.entries(data).map(([id, val]) => ({ id, ...val }));

        // Продвинутая фильтрация
        if (filterData) {
            if (filterData.query) {
                orders = orders.filter(o => o.title.toLowerCase().includes(filterData.query.toLowerCase()));
            }
            if (filterData.category && filterData.category !== 'all') {
                orders = orders.filter(o => o.category === filterData.category);
            }
            if (filterData.minPrice) {
                orders = orders.filter(o => o.price >= parseInt(filterData.minPrice));
            }
        }

        // Сортировка: Сначала новые
        orders.sort((a, b) => b.date - a.date);

        container.innerHTML = orders.map(job => `
            <div class="glass-card job-card animate" onclick="window.openOrderDetails('${job.id}')">
                <div class="job-badge">${job.category}</div>
                <div class="job-header">
                    <h3 class="job-title">${job.title}</h3>
                    <div class="job-price">${new Intl.NumberFormat('ru-RU').format(job.price)} ₸</div>
                </div>
                <p class="job-excerpt">${job.description.substring(0, 100)}${job.description.length > 100 ? '...' : ''}</p>
                <div class="job-footer">
                    <div class="job-meta">
                        <span>📍 ${job.city || 'Удаленно'}</span>
                        <span>🕒 ${window.formatTimeAgo(job.date)}</span>
                    </div>
                    <div class="job-owner">
                        <div class="owner-avatar">${job.owner[0]}</div>
                        <span>ID: ${job.owner.slice(-4)}</span>
                    </div>
                </div>
                ${job.status === 'in_progress' ? '<div class="status-tag busy">В работе</div>' : ''}
            </div>
        `).join('');
    });
};

/**
 * Создание нового заказа (Бизнес-логика)
 */
window.publishOrder = async () => {
    const user = window.AppState.user;
    if (!user || user.role !== 'business') {
        return window.systemNotification("Только заказчики могут публиковать задачи", "error");
    }

    const title = document.getElementById('new-job-title').value.trim();
    const price = parseInt(document.getElementById('new-job-price').value);
    const category = document.getElementById('new-job-cat').value;
    const desc = document.getElementById('new-job-desc').value.trim();

    // Валидация
    if (title.length < 10) return window.systemNotification("Заголовок слишком короткий", "error");
    if (isNaN(price) || price < 500) return window.systemNotification("Минимальный бюджет: 500 ₸", "error");
    if (user.balance < price) return window.systemNotification("Недостаточно средств для публикации", "error");

    try {
        const orderId = push(child(ref(db), 'orders')).key;
        const orderData = {
            title,
            price,
            category,
            description: desc,
            owner: user.phone,
            status: 'open',
            date: Date.now(),
            city: 'Алматы',
            candidates: 0
        };

        // Атомарное обновление: создание заказа + списание баланса
        const updates = {};
        updates[`/orders/${orderId}`] = orderData;
        
        const newBalance = user.balance - price;
        const newTransaction = {
            type: 'hold',
            msg: `Залог за проект: ${title}`,
            amt: -price,
            date: Date.now()
        };

        updates[`/users/${user.phone}/balance`] = newBalance;
        updates[`/users/${user.phone}/transactions`] = [...(user.transactions || []), newTransaction];

        await update(ref(db), updates);
        
        window.systemNotification("Заказ успешно опубликован!");
        window.closeModals();
        window.showSection('market');
    } catch (e) {
        console.error(e);
        window.systemNotification("Ошибка при публикации", "error");
    }
};

/**
 * Хелпер: Форматирование времени (типа "2 часа назад")
 */
window.formatTimeAgo = (timestamp) => {
    const diff = Math.floor((Date.now() - timestamp) / 1000);
    if (diff < 60) return 'только что';
    if (diff < 3600) return `${Math.floor(diff / 60)} мин. назад`;
    if (diff < 86400) return `${Math.floor(diff / 3600)} ч. назад`;
    return new Date(timestamp).toLocaleDateString();
};

/**
 * Динамическая фильтрация с главной страницы
 */
window.applyMarketFilters = () => {
    const query = document.getElementById('market-search-input').value;
    const category = document.getElementById('market-cat-select').value;
    const minPrice = document.getElementById('market-price-min').value;

    window.renderMarketplace({ query, category, minPrice });
};

    /* --- МОДУЛЬ 4: FINANCIAL & XP SYSTEM --- */

/**
 * Система начисления опыта (XP) и уровней
 */
window.grantExperience = async (amount) => {
    const user = window.AppState.user;
    if (!user) return;

    let newExp = (user.exp || 0) + amount;
    let newLevel = user.level || 1;

    // Расчет уровня (каждые 500 XP = новый уровень)
    if (newExp >= 500) {
        newLevel += Math.floor(newExp / 500);
        newExp = newExp % 500;
        window.systemNotification(`Уровень повышен! Теперь вы: ${newLevel} LVL`, "success");
    }

    await update(ref(db, `users/${user.phone}`), {
        exp: newExp,
        level: newLevel
    });
};

/**
 * Процесс завершения заказа и выплаты
 */
window.completeOrder = async (orderId) => {
    const ordersRef = ref(db, `orders/${orderId}`);
    const snap = await get(ordersRef);
    const order = snap.val();

    if (!order || order.status !== 'in_progress') return;

    try {
        const workerPhone = order.worker;
        const workerSnap = await get(ref(db, `users/${workerPhone}`));
        const workerData = workerSnap.val();

        const updates = {};
        
        // 1. Закрываем заказ
        updates[`/orders/${orderId}/status`] = 'completed';

        // 2. Начисляем деньги исполнителю
        const newBalance = (workerData.balance || 0) + order.price;
        const transaction = {
            type: 'income',
            msg: `Оплата за: ${order.title}`,
            amt: order.price,
            date: Date.now()
        };

        updates[`/users/${workerPhone}/balance`] = newBalance;
        updates[`/users/${workerPhone}/transactions`] = [...(workerData.transactions || []), transaction];

        await update(ref(db), updates);
        
        // 3. Даем XP за работу
        window.grantExperience(150); 
        
        window.systemNotification("Заказ успешно оплачен!");
    } catch (e) {
        console.error(e);
        window.systemNotification("Ошибка при выплате", "error");
    }
};

/**
 * Пополнение баланса (Имитация платежного шлюза)
 */
window.depositFunds = async (amount) => {
    const user = window.AppState.user;
    if (!user || amount < 100) return;

    const newBalance = (user.balance || 0) + amount;
    const newTr = {
        type: 'deposit',
        msg: 'Пополнение через WorkLink Pay',
        amt: amount,
        date: Date.now()
    };

    await update(ref(db, `users/${user.phone}`), {
        balance: newBalance,
        transactions: [...(user.transactions || []), newTr]
    });

    window.systemNotification(`Счет пополнен на ${amount} ₸`);
};
</script>
