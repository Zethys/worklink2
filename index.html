<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkLink — Ultimate Ecosystem</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6c38ff;
            --primary-dark: #562cd9;
            --bg: #fdf6e3;
            --card-bg: #ffffff;
            --text: #2d3436;
            --success: #27ae60;
            --input-bg: #fff9e6;
            --star: #f1c40f;
            --accent: #ff4757;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1a1a1a;
                --card-bg: #2d2d2d;
                --text: #f1f1f1;
                --input-bg: #3d3d3d;
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); transition: 0.3s; line-height: 1.6; }

        /* Navigation */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 50px; background: var(--primary); color: white;
            position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .logo { font-weight: 800; font-size: 28px; cursor: pointer; letter-spacing: -1px; }
        .nav-links { display: flex; align-items: center; }
        .nav-links a { color: white; text-decoration: none; margin-left: 25px; font-size: 14px; font-weight: 600; cursor: pointer; }

        .page { display: none; min-height: 100vh; padding-bottom: 80px; }
        .active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .card { background: var(--card-bg); padding: 30px; border-radius: 24px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }

        /* Badges */
        .badge { display: inline-block; padding: 4px 12px; border-radius: 8px; font-size: 11px; font-weight: 800; text-transform: uppercase; margin-right: 5px; }
        .badge-pro { background: linear-gradient(90deg, #f1c40f, #f39c12); color: white; }
        .badge-cat { background: var(--primary); color: white; }

        /* Chat System */
        .chat-container { height: 300px; overflow-y: auto; background: var(--input-bg); border-radius: 15px; padding: 15px; margin-bottom: 10px; }
        .msg { margin-bottom: 10px; padding: 10px; border-radius: 10px; max-width: 80%; }
        .msg-own { background: var(--primary); color: white; margin-left: auto; }
        .msg-other { background: #eee; color: #333; }

        /* Profile & Levels */
        .level-bar { height: 10px; background: #eee; border-radius: 5px; margin: 10px 0; overflow: hidden; }
        .level-progress { height: 100%; background: var(--success); transition: 0.5s; }

        /* Modals */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.7); z-index: 2000; align-items: center; justify-content: center; 
        }
        .modal-content { background: var(--card-bg); padding: 40px; border-radius: 30px; width: 90%; max-width: 500px; animation: popUp 0.3s ease; }
        @keyframes popUp { from { transform: scale(0.9); } to { transform: scale(1); } }

        /* Buttons */
        .btn { padding: 16px 25px; border-radius: 14px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; display: inline-block; text-align: center; }
        .btn-main { background: var(--primary); color: white; width: 100%; }
        .btn-success { background: var(--success); color: white; }
        .btn-ghost { background: none; border: 2px solid var(--primary); color: var(--primary); }

        .input-group { margin-bottom: 20px; }
        .input-group input, .input-group select, .input-group textarea { width: 100%; padding: 16px; border-radius: 14px; border: none; background: var(--input-bg); color: var(--text); }

        #toasts { position: fixed; top: 100px; right: 20px; z-index: 3000; }
        .toast { background: var(--primary); color: white; padding: 15px 25px; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div id="toasts"></div>

<div id="chatModal" class="modal">
    <div class="modal-content">
        <h2 id="chatTitle">Чат по заказу</h2>
        <div id="chatBox" class="chat-container"></div>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="chatInput" placeholder="Введите сообщение..." style="flex:1; padding:10px; border-radius:10px; border:none; background:var(--input-bg); color:var(--text);">
            <button class="btn btn-main" style="width:auto;" onclick="sendMessage()">OTP</button>
        </div>
        <button class="btn btn-ghost" style="width:100%; margin-top:10px;" onclick="closeModals()">Закрыть</button>
    </div>
</div>

<nav>
    <div class="logo" onclick="showPage('home')">worklink</div>
    <div class="nav-links" id="guestNav">
        <a onclick="showPage('login')">Вход</a>
        <a onclick="showPage('register')">Регистрация</a>
    </div>
    <div class="nav-links" id="userNav" style="display:none">
        <a id="dashBtn">Задачи</a>
        <a onclick="showPage('profile')">Профиль</a>
        <a onclick="logout()" style="color:var(--accent)">Выйти</a>
    </div>
</nav>

<div id="home" class="page active">
    <div class="container" style="text-align: center; padding-top: 100px;">
        <h1 style="font-size: 56px;">Работа будущего</h1>
        <p style="font-size: 20px; margin: 20px 0 40px;">Единственная платформа, где твой рейтинг — это твоя валюта.</p>
        <button class="btn btn-main" style="width: auto; padding: 20px 50px;" onclick="showPage('register')">Присоединиться</button>
    </div>
</div>

<div id="profile" class="page">
    <div class="container">
        <div class="card">
            <div style="display: flex; align-items: center; gap: 20px;">
                <div id="userAvatar" style="width:80px; height:80px; background:var(--primary); border-radius:20px; display:flex; align-items:center; justify-content:center; color:white; font-size:32px; font-weight:900;">W</div>
                <div>
                    <h2 id="pName">User</h2>
                    <span id="pRole" class="badge badge-cat">Worker</span>
                    <span id="pStatus" class="badge badge-pro" style="display:none;">PRO</span>
                </div>
            </div>
            
            <div style="margin-top: 30px;">
                <p>Уровень опыта: <span id="levelText">1</span></p>
                <div class="level-bar"><div id="levelProgress" class="level-progress" style="width: 10%;"></div></div>
            </div>
        </div>

        <div class="card">
            <h3>Ваш Баланс: <span id="pBalance" style="color:var(--success)">0 ₸</span></h3>
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button class="btn btn-main" style="flex:1" onclick="openDeposit()">Пополнить</button>
                <button class="btn btn-ghost" style="flex:1">Вывести</button>
            </div>
        </div>
        
        <div class="card">
            <h3>О себе / Навыки</h3>
            <textarea id="pBio" placeholder="Расскажите о своем опыте..." style="width:100%; margin-top:10px; background:var(--input-bg); border:none; border-radius:15px; padding:15px; color:var(--text);"></textarea>
            <button class="btn btn-main" style="margin-top:10px; width:auto;" onclick="saveBio()">Сохранить</button>
        </div>
    </div>
</div>

<div id="worker_panel" class="page"><div class="container">
    <h2>Доступные смены</h2>
    <div id="jobList"></div>
</div></div>

<div id="business_panel" class="page"><div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2>Ваши объявления</h2>
        <button class="btn btn-main" style="width:auto;" onclick="showPage('create_order')">+ Создать</button>
    </div>
    <div id="bizOrderList"></div>
</div></div>

<div id="create_order" class="page"><div class="container"><div class="form-box">
    <h2>Новая задача</h2>
    <div class="input-group"><input type="text" id="oTitle" placeholder="Название (напр. Курьер)"></div>
    <div class="input-group"><select id="oCat"><option value="Доставка">🛵 Доставка</option><option value="IT">💻 Программирование</option><option value="Труд">💪 Физический труд</option></select></div>
    <div class="input-group"><input type="number" id="oPrice" placeholder="Сумма оплаты"></div>
    <div class="input-group"><input type="text" id="oCity" placeholder="Город"></div>
    <button class="btn btn-success" onclick="postOrder()">Опубликовать</button>
</div></div></div>

<div id="login" class="page"><div class="container"><div class="form-card card" style="max-width:400px; margin:auto;">
    <h2>Вход</h2>
    <div class="input-group"><input type="text" id="lPhone" placeholder="Телефон"></div>
    <div class="input-group"><input type="password" id="lPass" placeholder="Пароль"></div>
    <button class="btn btn-main" onclick="auth('log')">Войти</button>
</div></div></div>

<div id="register" class="page"><div class="container"><div class="form-card card" style="max-width:400px; margin:auto;">
    <h2>Регистрация</h2>
    <div class="input-group"><input type="text" id="rPhone" placeholder="Телефон"></div>
    <div class="input-group"><input type="password" id="rPass" placeholder="Пароль"></div>
    <div class="input-group"><select id="rRole"><option value="worker">Исполнитель</option><option value="business">Бизнес</option></select></div>
    <button class="btn btn-main" onclick="auth('reg')">Начать</button>
</div></div></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, set, get, child, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAjSLp9bkzKz71GytZU1Jz5bQoNMKB5Fxo",
        authDomain: "worklink-5384c.firebaseapp.com",
        databaseURL: "https://worklink-5384c-default-rtdb.firebaseio.com/",
        projectId: "worklink-5384c",
        storageBucket: "worklink-5384c.firebasestorage.app",
        appId: "1:582114312352:web:08dea19f81f35abfe649c5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let user = JSON.parse(localStorage.getItem('wl_session')) || null;
    let currentChatId = null;

    function toast(m) {
        const t = document.createElement('div'); t.className = 'toast'; t.innerText = m;
        document.getElementById('toasts').appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    window.showPage = (id) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    };

    window.auth = async (t) => {
        const p = document.getElementById(t === 'reg' ? 'rPhone' : 'lPhone').value;
        const s = document.getElementById(t === 'reg' ? 'rPass' : 'lPass').value;
        if(t === 'reg') {
            const r = document.getElementById('rRole').value;
            await set(ref(db, 'users/'+p), { phone: p, pass: s, role: r, balance: 0, exp: 0, bio: "" });
            toast("Профиль создан!"); showPage('login');
        } else {
            const sn = await get(child(ref(db), `users/${p}`));
            if(sn.exists() && sn.val().pass === s) {
                user = sn.val(); localStorage.setItem('wl_session', JSON.stringify(user));
                initSession();
            } else toast("Ошибка входа!");
        }
    };

    function initSession() {
        if(!user) return;
        document.getElementById('guestNav').style.display = 'none';
        document.getElementById('userNav').style.display = 'flex';
        
        onValue(ref(db, `users/${user.phone}`), (sn) => {
            const d = sn.val();
            user = d;
            document.getElementById('pName').innerText = d.phone;
            document.getElementById('pBalance').innerText = (d.balance || 0) + " ₸";
            document.getElementById('pBio').value = d.bio || "";
            
            // Расчет уровня
            const exp = d.exp || 0;
            const level = Math.floor(exp / 100) + 1;
            document.getElementById('levelText').innerText = level;
            document.getElementById('levelProgress').style.width = (exp % 100) + "%";
            if(level >= 3) document.getElementById('pStatus').style.display = 'inline-block';
        });

        const dBtn = document.getElementById('dashBtn');
        if(user.role === 'business') {
            dBtn.onclick = () => showPage('business_panel');
            onValue(ref(db, 'orders'), renderBiz);
            showPage('business_panel');
        } else {
            dBtn.onclick = () => showPage('worker_panel');
            onValue(ref(db, 'orders'), renderWorker);
            showPage('worker_panel');
        }
    }

    window.postOrder = async () => {
        const pr = Number(document.getElementById('oPrice').value);
        if(user.balance < pr) return toast("Недостаточно средств!");
        await push(ref(db, 'orders'), {
            title: document.getElementById('oTitle').value,
            category: document.getElementById('oCat').value,
            price: pr, city: document.getElementById('oCity').value,
            status: 'open', owner: user.phone
        });
        await update(ref(db, `users/${user.phone}`), { balance: user.balance - pr });
        toast("Опубликовано!"); showPage('business_panel');
    };

    function renderBiz(sn) {
        const list = document.getElementById('bizOrderList'); list.innerHTML = "";
        const data = sn.val();
        for(let id in data) {
            if(data[id].owner === user.phone) {
                const el = document.createElement('div'); el.className = 'card';
                el.innerHTML = `<span class="badge badge-cat">${data[id].category}</span>
                <h3>${data[id].title}</h3><p>${data[id].price} ₸ · ${data[id].status}</p>
                <button class="btn btn-ghost" style="margin-top:10px;" onclick="openChat('${id}')">Чат</button>`;
                list.appendChild(el);
            }
        }
    }

    function renderWorker(sn) {
        const list = document.getElementById('jobList'); list.innerHTML = "";
        const data = sn.val();
        for(let id in data) {
            if(data[id].status === 'open') {
                const el = document.createElement('div'); el.className = 'card';
                el.innerHTML = `<span class="badge badge-cat">${data[id].category}</span>
                <h3>${data[id].title}</h3><p>${data[id].price} ₸ · ${data[id].city}</p>
                <button class="btn btn-main" style="margin-top:10px;" onclick="takeJob('${id}')">Взять смену</button>`;
                list.appendChild(el);
            }
        }
    }

    window.takeJob = async (id) => {
        const osn = await get(child(ref(db), `orders/${id}`));
        const price = osn.val().price;
        await update(ref(db, `orders/${id}`), { status: 'taken', worker: user.phone });
        // Авто-выплата + опыт
        await update(ref(db, `users/${user.phone}`), { 
            balance: (user.balance || 0) + price,
            exp: (user.exp || 0) + 25
        });
        toast("Смена принята! Получено 25 XP");
    };

    window.saveBio = () => {
        update(ref(db, `users/${user.phone}`), { bio: document.getElementById('pBio').value });
        toast("Сохранено!");
    };

    // ЧАТ
    window.openChat = (orderId) => {
        currentChatId = orderId;
        document.getElementById('chatModal').style.display = 'flex';
        onValue(ref(db, `chats/${orderId}`), (sn) => {
            const box = document.getElementById('chatBox'); box.innerHTML = "";
            const msgs = sn.val();
            for(let mId in msgs) {
                const m = msgs[mId];
                const div = document.createElement('div');
                div.className = `msg ${m.sender === user.phone ? 'msg-own' : 'msg-other'}`;
                div.innerText = m.text;
                box.appendChild(div);
            }
            box.scrollTop = box.scrollHeight;
        });
    };

    window.sendMessage = () => {
        const text = document.getElementById('chatInput').value;
        if(!text) return;
        push(ref(db, `chats/${currentChatId}`), { sender: user.phone, text, time: Date.now() });
        document.getElementById('chatInput').value = "";
    };

    window.closeModals = () => document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
    window.logout = () => { localStorage.clear(); location.reload(); };
    if(user) initSession();
</script>
</body>
</html>
